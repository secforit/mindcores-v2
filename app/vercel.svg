<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B8860B;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#F4D03F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Outer circle -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="url(#goldGradient)" stroke-width="5"/>

  <!-- Celtic knot design -->
  <g fill="none" stroke="url(#goldGradient)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">

    <!-- Top teardrop/loop -->
    <path d="M100 30
             Q95 35, 95 42
             Q95 50, 100 55
             Q105 50, 105 42
             Q105 35, 100 30"/>

    <!-- Main Celtic knot - figure 8 with crossing -->
    <!-- Left infinity loop -->
    <path d="M100 60
             C75 60, 50 75, 50 100
             C50 125, 75 140, 100 140
             C80 140, 60 125, 60 100
             C60 75, 80 60, 100 60"/>

    <!-- Right infinity loop -->
    <path d="M100 60
             C125 60, 150 75, 150 100
             C150 125, 125 140, 100 140
             C120 140, 140 125, 140 100
             C140 75, 120 60, 100 60"/>

    <!-- Cross-over diagonal - top left to bottom right -->
    <path d="M70 55
             Q85 70, 100 100
             Q115 130, 130 145"/>

    <!-- Cross-over diagonal - top right to bottom left -->
    <path d="M130 55
             Q115 70, 100 100
             Q85 130, 70 145"/>

    <!-- Inner horizontal figure-8 -->
    <path d="M55 100
             C55 85, 75 75, 100 75
             C125 75, 145 85, 145 100
             C145 115, 125 125, 100 125
             C75 125, 55 115, 55 100"/>

    <!-- Bottom teardrop/loop -->
    <path d="M100 170
             Q95 165, 95 158
             Q95 150, 100 145
             Q105 150, 105 158
             Q105 165, 100 170"/>
  </g>
</svg>
